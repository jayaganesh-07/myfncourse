<html>

<head>
    <title>Informations</title>
</head>

<body>
    <section>
        <div>
            <center>
                <h1>Gym Membership Form</h1>
                <form method="post">
                    <label>Enter the Name</label><br>
                    <input type="text" placeholder="Enter the Name"><br><br>
                    <label>Enger the Age</label> <br>
                    <input type="number" required placeholder="Enter the Age"><br><br>
                    <label>Enter Mobile Number</label> <br>
                    <input type="tel" required minlength="10" maxlength="10" placeholder="10 Digit Number"><br><br>
                    <label>Joining Date</label> <br>
                    <input type="Date"><br><br>
                    <label>Gender</label> <br>
                    <input type="radio" name="Gender"> Male
                    <input type="radio" name="Gender"> Female <br><br>
                    <label>Package</label> <br>
                    <input type="radio" required name="Gender"> One Month
                    <input type="radio" required name="Gender"> Six Months
                    <input type="radio" required name="Gender"> One Year <br><br>
                    <label>Fitness goal</label> <br>
                    <input type="checkbox"> Weight Loss
                    <input type="checkbox"> Muscle Gain
                    <input type="checkbox"> Yoga <br><br>
                    <label>Email</label> <br>
                    <input type="email" required placeholder="Enter Email"><br><br>
                    <label>Workout Time</label> <br>
                    <input type="time"><br><br>
                    <label>Upload Photo</label> <br>
                    <input type="file"><br><br>
                    <label>Sumit</label> <br>
                    <input type="submit" value="Join Now"><br><br>
                    <input type="reset" value="Clear Form">
                </form>
            </center>
        </div>
    </section>
</body>

</html>
