<html>

<head>
    <title>Login and Signup Form</title>
</head>

<body>
<center>
    
    <h2>Login Form</h2>

    <form>

        <label>Username</label>
        <input type="text" placeholder="Enter username" required minlength="4" maxlength="15"><br><br>

        <label>Password</label>
        <input type="password" placeholder="Enter password" required minlength="6" maxlength="12"><br><br>

        <input type="submit" value="Login">

    </form>

    <hr>

    <h2>Signup Form</h2>

    <form>

        <label>Name</label>
        <input type="text" placeholder="Enter full name" required><br><br>

        <label>Email</label>
        <input type="email" placeholder="Enter email" required><br><br>

        <label>Password</label>
        <input type="password" placeholder="Create password" required minlength="6"><br><br>

        <label>Phone</label>
        <input type="text" placeholder="Enter mobile number" maxlength="10" required><br><br>

        <input type="submit" value="Signup">

    </form>
</center>

</body>

</html>
