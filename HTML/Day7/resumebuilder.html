<html>

<head>
    <title>Resume Builder Form</title>
</head>

<body>

    <center>
        <h1>Resume Builder Form</h1>

    <form>

        <fieldset>
            <legend>Personal Details</legend>

            <label>Name:</label>
            <input type="text" placeholder="Enter the name"><br><br>

            <label>Email:</label>
            <input type="email" placeholder="Enterthe Email"><br><br>

            <label>Phone:</label>
            <input type="tel" placeholder="10 Digit number"><br><br>

            <label>Address:</label>
            <textarea></textarea>

        </fieldset>

        <br>

        <fieldset>
            <legend>Education Details</legend>

            <label>Degree:</label>
            <input type="text"><br><br>

            <label>College Name:</label>
            <input type="text"><br><br>

            <label>Year Passed:</label>
            <input type="tel" placeholder="6 digit number">

        </fieldset>

        <br>

        <fieldset>
            <legend>Skills</legend>

            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
            <input type="checkbox"> JavaScript
            <input type="checkbox"> Python

        </fieldset>

        <br>

        <fieldset>
            <legend>Experience</legend>

            <textarea rows="5" cols="40"></textarea>

        </fieldset>

        <br>

        <fieldset>
            <legend>Upload Resume</legend>

            <input type="file">

        </fieldset>

        <br>

        <input type="submit" value="Create Resume">

    </form>
    </center>

</body>

</html>
